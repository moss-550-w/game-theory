# 四大理论支柱（design.md §2.1, §8.1）
# 字段约定见 src/types/index.ts -> Theory

- id: minimax
  name: 极小极大定理
  quadrant: bottom-left
  themeColor: '#1A5276'
  oneLineDef: 零和博弈中存在使最坏收益最大化的最优（混合）策略。
  coreAssumptions:
    - 两人零和
    - 完全信息
    - 静态一次性决策
  equilibriumCondition: 每方策略使对手最优反应下的自身收益最大化，鞍点存在。
  tags: [non-cooperative, static, complete-info, zero-sum]
  scene: 双方严格对抗、总收益为零的最优策略

- id: nash
  name: 纳什均衡
  quadrant: bottom-right
  themeColor: '#6C3483'
  oneLineDef: 没有任何参与者能通过单方面改变策略而获益的策略组合。
  coreAssumptions:
    - 有限参与者
    - 完全信息
    - 理性共识
  equilibriumCondition: 每个参与者的策略都是对其他人策略的最佳反应。
  tags: [non-cooperative, static, complete-info, non-zero-sum]
  scene: 存在合作共赢空间的单次决策均衡

- id: backward-induction
  name: 逆向归纳均衡
  quadrant: top-right
  themeColor: '#1D8348'
  oneLineDef: 在动态博弈中从末端逆推、排除不可信威胁的子博弈完美均衡。
  coreAssumptions:
    - 序贯行动
    - 完美/完全信息
    - 序贯理性
  equilibriumCondition: 在每个子博弈上都构成纳什均衡。
  tags: [non-cooperative, dynamic, complete-info, non-zero-sum]
  scene: 多阶段博弈中可信承诺与理性预测

- id: bayesian
  name: 贝叶斯均衡
  quadrant: top-left
  themeColor: '#D68910'
  oneLineDef: 信息不对称下，参与者基于类型信念最优反应的均衡。
  coreAssumptions:
    - 不完全信息
    - 海萨尼转换
    - 共同先验
  equilibriumCondition: 每种类型的策略在给定信念下最大化期望收益。
  tags: [non-cooperative, static, incomplete-info, non-zero-sum]
  scene: 信息不对称下的最优策略推理
